<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1e1040"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- خلفية -->
  <rect width="300" height="400" fill="url(#bgGrad3)" rx="12"/>
  <!-- إطار خارجي -->
  <rect x="10" y="10" width="280" height="380" fill="none" stroke="url(#purpleGrad)" stroke-width="1.5" rx="8" opacity="0.3"/>
  <!-- زخرفة هندسية -->
  <line x1="30" y1="60" x2="270" y2="60" stroke="#a78bfa" stroke-width="0.5" opacity="0.15"/>
  <line x1="30" y1="340" x2="270" y2="340" stroke="#a78bfa" stroke-width="0.5" opacity="0.15"/>
  <!-- أيقونة ورقة اختبار -->
  <g transform="translate(150,150)" opacity="0.25">
    <rect x="-28" y="-35" width="56" height="70" fill="none" stroke="#a78bfa" stroke-width="2.5" rx="3"/>
    <polyline points="8,-35 28,-35 28,-15" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linejoin="round"/>
    <!-- أسطر الاختبار -->
    <circle cx="-16" cy="-18" r="2.5" fill="#a78bfa"/>
    <line x1="-8" y1="-18" x2="18" y2="-18" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="-16" cy="-6" r="2.5" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="-8" y1="-6" x2="12" y2="-6" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="-16" cy="6" r="2.5" fill="#a78bfa"/>
    <line x1="-8" y1="6" x2="16" y2="6" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="-16" cy="18" r="2.5" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="-8" y1="18" x2="10" y2="18" stroke="#a78bfa" stroke-width="1.5"/>
  </g>
  <!-- أيقونة الساعة -->
  <g transform="translate(150,210)" opacity="0.3">
    <circle cx="0" cy="0" r="16" fill="none" stroke="#a78bfa" stroke-width="2"/>
    <path d="M0,-10v10l7,3" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- نص "قريباً" -->
  <text x="150" y="260" font-family="Cairo, sans-serif" font-size="36" font-weight="900" fill="url(#purpleGrad)" text-anchor="middle" dominant-baseline="middle">قريباً</text>
  <!-- نص فرعي -->
  <text x="150" y="295" font-family="Cairo, sans-serif" font-size="13" font-weight="600" fill="#a78bfa" text-anchor="middle" dominant-baseline="middle" opacity="0.45">اختبارات الحصص — قيد الإعداد</text>
  <!-- فئة -->
  <rect x="90" y="320" width="120" height="26" rx="13" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
  <text x="150" y="336" font-family="Cairo, sans-serif" font-size="11" font-weight="700" fill="#a78bfa" text-anchor="middle" dominant-baseline="middle" opacity="0.5">اختبارات</text>
</svg>
