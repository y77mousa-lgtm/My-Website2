<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#132440"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8922E"/>
    </linearGradient>
  </defs>
  <!-- خلفية -->
  <rect width="300" height="400" fill="url(#bgGrad)" rx="12"/>
  <!-- إطار خارجي -->
  <rect x="10" y="10" width="280" height="380" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" rx="8" opacity="0.3"/>
  <!-- زخرفة هندسية -->
  <line x1="30" y1="60" x2="270" y2="60" stroke="#D4A843" stroke-width="0.5" opacity="0.15"/>
  <line x1="30" y1="340" x2="270" y2="340" stroke="#D4A843" stroke-width="0.5" opacity="0.15"/>
  <!-- أيقونة كتاب -->
  <g transform="translate(150,165)" opacity="0.25">
    <rect x="-35" y="-40" width="70" height="80" fill="none" stroke="#D4A843" stroke-width="2.5" rx="4"/>
    <line x1="-20" y1="-25" x2="20" y2="-25" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="-20" y1="-15" x2="15" y2="-15" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="-20" y1="-5" x2="18" y2="-5" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="-20" y1="5" x2="10" y2="5" stroke="#D4A843" stroke-width="1.5"/>
    <path d="M35,-40 L35,40" stroke="#D4A843" stroke-width="2"/>
  </g>
  <!-- أيقونة الساعة -->
  <g transform="translate(150,130)" opacity="0.3">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#D4A843" stroke-width="2"/>
    <path d="M0,-12v12l8,4" fill="none" stroke="#D4A843" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- نص "قريباً" -->
  <text x="150" y="240" font-family="Cairo, sans-serif" font-size="36" font-weight="900" fill="url(#goldGrad)" text-anchor="middle" dominant-baseline="middle">قريباً</text>
  <!-- نص فرعي -->
  <text x="150" y="275" font-family="Cairo, sans-serif" font-size="13" font-weight="600" fill="#D4A843" text-anchor="middle" dominant-baseline="middle" opacity="0.45">اللغة العربية — قيد الإعداد</text>
  <!-- فئة -->
  <rect x="100" y="305" width="100" height="26" rx="13" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.3"/>
  <text x="150" y="321" font-family="Cairo, sans-serif" font-size="11" font-weight="700" fill="#D4A843" text-anchor="middle" dominant-baseline="middle" opacity="0.5">عربي</text>
</svg>
