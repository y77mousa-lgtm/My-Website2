<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400" role="img" aria-label="غلاف مذكرة التربية الإسلامية - الصف الثالث الإعدادي">
  <defs>
    <linearGradient id="p3r-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#0f2a1a"/>
    </linearGradient>
    <linearGradient id="p3r-acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <!-- خلفية -->
  <rect width="300" height="400" fill="url(#p3r-bg)" rx="12"/>
  <!-- إطار خارجي -->
  <rect x="10" y="10" width="280" height="380" fill="none" stroke="url(#p3r-acc)" stroke-width="1.5" rx="8" opacity="0.35"/>
  <!-- زخرفة هندسية -->
  <line x1="30" y1="60" x2="270" y2="60" stroke="#22c55e" stroke-width="0.5" opacity="0.18"/>
  <line x1="30" y1="340" x2="270" y2="340" stroke="#22c55e" stroke-width="0.5" opacity="0.18"/>
  <!-- شارة قريبًا -->
  <rect x="118" y="84" width="64" height="26" rx="13" fill="url(#p3r-acc)"/>
  <text x="150" y="97" font-family="Cairo, Segoe UI, sans-serif" font-size="12.5" font-weight="800" fill="#0A1628" text-anchor="middle" dominant-baseline="middle">قريبًا</text>
  <!-- أيقونة هلال -->
  <g transform="translate(150,205)" opacity="0.32">
    <path d="M0,-30 A30,30 0 1,1 0,30 A21,21 0 1,0 0,-30" fill="none" stroke="#22c55e" stroke-width="2.5"/>
    <circle cx="13" cy="-13" r="3.5" fill="#22c55e"/>
  </g>
  <!-- عنوان الصف -->
  <text x="150" y="140" font-family="Cairo, Segoe UI, sans-serif" font-size="23" font-weight="900" fill="url(#p3r-acc)" text-anchor="middle" dominant-baseline="middle">الصف الثالث الإعدادي</text>
  <!-- عنوان المادة -->
  <text x="150" y="300" font-family="Cairo, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#22c55e" text-anchor="middle" dominant-baseline="middle" opacity="0.55">التربية الإسلامية</text>
  <!-- عنوان سفلي -->
  <text x="150" y="318" font-family="Cairo, Segoe UI, sans-serif" font-size="16" font-weight="800" fill="url(#p3r-acc)" text-anchor="middle" dominant-baseline="middle" opacity="0.92">الإصدار الجديد قريبًا</text>
</svg>
